<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>AlphaML · 模型表现</title>
<style>
  :root{
    --bg:#0e1216; --panel:#151b22; --panel2:#1a212a; --line:#232c38;
    --ink:#c9d4e0; --ink-dim:#8494a6; --ink-faint:#5c6b7d;
    --accent:#3fb9b0; --pos:#3bbf83; --neg:#e0606a;
    --grid:#1e2029; --grid:#20272f;
    --shadow:0 1px 0 rgba(255,255,255,.02) inset, 0 8px 30px rgba(0,0,0,.35);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  }
  @media (prefers-color-scheme:light){
    :root{ --bg:#f6f8fa; --panel:#ffffff; --panel2:#f0f3f6; --line:#e3e9ef;
      --ink:#1b2530; --ink-dim:#586675; --ink-faint:#8595a6;
      --accent:#1a938b; --pos:#1f9d63; --neg:#cf4552; --grid:#eaeef2; }
  }
  :root[data-theme="dark"]{ --bg:#0e1216; --panel:#151b22; --panel2:#1a212a; --line:#232c38;
    --ink:#c9d4e0; --ink-dim:#8494a6; --ink-faint:#5c6b7d; --accent:#3fb9b0;
    --pos:#3bbf83; --neg:#e0606a; --grid:#20272f; }
  :root[data-theme="light"]{ --bg:#f6f8fa; --panel:#ffffff; --panel2:#f0f3f6; --line:#e3e9ef;
    --ink:#1b2530; --ink-dim:#586675; --ink-faint:#8595a6; --accent:#1a938b;
    --pos:#1f9d63; --neg:#cf4552; --grid:#eaeef2; }

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:17.5px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:36px 26px 80px}
  a{color:var(--accent)}

  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;
    gap:16px;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:26px}
  .brand{display:flex;flex-direction:column;gap:8px}
  .eyebrow{font-family:var(--mono);font-size:13.5px;letter-spacing:.14em;
    color:var(--accent)}
  h1{font-size:34px;font-weight:600;letter-spacing:-.01em;margin:0;text-wrap:balance}
  .sub{color:var(--ink-dim);font-size:16px;max-width:52em;line-height:1.7}
  .meta{font-family:var(--mono);font-size:14px;color:var(--ink-faint);text-align:right;line-height:1.8}

  .tabs{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:24px}
  .tab{font-family:var(--mono);font-size:15px;letter-spacing:.02em;color:var(--ink-dim);
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:10px 16px;cursor:pointer;transition:.15s;display:flex;gap:10px;align-items:baseline}
  .tab .p{color:var(--ink-faint);font-size:13px}
  .tab:hover{color:var(--ink);border-color:var(--accent)}
  .tab.on{color:var(--bg);background:var(--accent);border-color:var(--accent);font-weight:600}
  .tab.on .p{color:var(--bg);opacity:.7}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .board{display:grid;grid-template-columns:1fr;gap:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    padding:18px 22px 0}
  .card-h h2{font-size:19px;font-weight:600;margin:0;letter-spacing:.01em}
  .card-h .note{font-family:var(--mono);font-size:13.5px;color:var(--ink-faint)}

  /* chart */
  .chartwrap{padding:14px 14px 6px;position:relative}
  svg.chart{display:block;width:100%;height:auto}
  .gridline{stroke:var(--grid);stroke-width:1}
  .axis-lbl{fill:var(--ink-faint);font-family:var(--mono);font-size:13px}
  .zeroline{stroke:var(--ink-faint);stroke-width:1;stroke-dasharray:2 3;opacity:.6}
  path.series{fill:none;stroke-width:1.4;opacity:.9;transition:opacity .12s,stroke-width .12s}
  path.series.dim{opacity:.12}
  path.series.hot{stroke-width:2.8;opacity:1}
  .endchip{font-family:var(--mono);font-size:13px}
  .crosshair{stroke:var(--ink-faint);stroke-width:1;opacity:.5}
  .tip{position:absolute;pointer-events:none;background:var(--panel2);border:1px solid var(--line);
    border-radius:9px;padding:10px 12px;font-family:var(--mono);font-size:14px;color:var(--ink);
    box-shadow:0 6px 20px rgba(0,0,0,.3);opacity:0;transition:opacity .1s;min-width:170px;z-index:5}
  .tip .td{color:var(--ink-faint);margin-bottom:5px}
  .tip .row{display:flex;justify-content:space-between;gap:14px;line-height:1.7}
  .tip .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:7px;vertical-align:middle}

  /* legend */
  .legend{display:flex;flex-wrap:wrap;gap:8px 16px;padding:8px 22px 20px}
  .lg{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:14px;
    color:var(--ink-dim);cursor:pointer;padding:3px 6px;border-radius:6px;transition:.12s}
  .lg:hover{color:var(--ink);background:var(--panel2)}
  .lg.off{opacity:.35}
  .lg .sw{width:13px;height:13px;border-radius:3px;flex:none}
  .lg.pin{color:var(--ink);font-weight:600}

  /* table */
  .tablewrap{overflow-x:auto;padding:6px 8px 14px}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:15.5px}
  th,td{padding:12px 15px;text-align:right;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  thead th{color:var(--ink-faint);font-weight:500;font-size:13.5px;letter-spacing:.03em;
    border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
  thead th:hover{color:var(--ink)}
  thead th.sortby{color:var(--accent)}
  tbody tr{border-bottom:1px solid var(--grid);cursor:pointer;transition:background .1s}
  tbody tr:hover{background:var(--panel2)}
  tbody tr.hot{background:var(--panel2)}
  td.num{font-variant-numeric:tabular-nums}
  .mname{display:flex;align-items:center;gap:9px}
  .mname .sw{width:12px;height:12px;border-radius:3px;flex:none}
  .mname .tag{font-size:12px;letter-spacing:.03em;color:var(--ink-faint);border:1px solid var(--line);
    border-radius:5px;padding:2px 7px}
  .pos{color:var(--pos)} .neg{color:var(--neg)}
  .bar{position:relative}
  .bar .fill{position:absolute;top:50%;transform:translateY(-50%);height:18px;border-radius:3px;opacity:.22;right:15px}
  .bar span{position:relative}
  .foot{color:var(--ink-faint);font-size:14.5px;font-family:var(--mono);margin-top:30px;
    border-top:1px solid var(--line);padding-top:18px;line-height:1.9}
  @media (max-width:640px){ h1{font-size:27px} .meta{text-align:left} body{font-size:16px} }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>


<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="eyebrow">AlphaML · 商品期货多空</div>
      <h1>各特征集下的模型表现</h1>
      <div class="sub">每个特征面板上所有模型的样本外净值曲线与风险指标。</div>
    </div>
    <div class="meta" id="meta"></div>
  </header>

  <nav class="tabs" id="tabs" aria-label="feature set"></nav>

  <div class="board">
    <section class="card">
      <div class="card-h">
        <h2>累计净值 <span style="color:var(--ink-faint);font-weight:400">(初始 = 1)</span></h2>
        <div class="note" id="chartnote"></div>
      </div>
      <div class="chartwrap" id="chartwrap"></div>
      <div class="legend" id="legend"></div>
    </section>

    <section class="card">
      <div class="card-h">
        <h2>风险与收益</h2>
        <div class="note">年化 · 点击某行高亮</div>
      </div>
      <div class="tablewrap"><table id="tbl"></table></div>
    </section>
  </div>
</div>

// ---- categorical palette: works on both grounds; stacking/AG emphasized -----
const COLORS = {
  stack_val:"#f4c04f", stack_eq:"#e08b3a", alphaglass:"#4fd1c8",
  avg:"#8593a6", linear:"#6d9fe0", linear_pos:"#4f7fd0",
  mlstockrec:"#c77dff",
  factorgcl:"#5fd08a", dcap:"#c9d05a",
  mlmft:"#f08a5d", dmfm:"#e0566a", fastfm:"#7a86ff"
};
const EMPH = new Set(["stack_val","stack_eq","alphaglass"]);
const TAG = {stack_val:"集成",stack_eq:"集成",alphaglass:"头牌",avg:"基准",linear:"基准",
  linear_pos:"基准",mlstockrec:"移植",
  factorgcl:"移植",dcap:"移植",mlmft:"移植",dmfm:"移植",fastfm:"移植"};
const ORDER = ["stack_val","stack_eq","alphaglass","avg","linear","linear_pos",
  "mlstockrec","factorgcl","dcap","mlmft","dmfm","fastfm"];
const LABEL = {stack_val:"stack·val",stack_eq:"stack·eq",linear_pos:"linear+"};
const lab = m => LABEL[m]||m;
const col = m => COLORS[m]||"#8593a6";
const fmt = (x,d=2)=> (x>=0?"+":"")+x.toFixed(d);

let active = 0, sel = new Set(), hover = null, sortKey="sharpe", sortDir=-1;

function setName(s){ return s.replace(/_/g,"·"); }

function buildTabs(){
  const t = document.getElementById("tabs");
  t.innerHTML = "";
  DATA.sets.forEach((s,i)=>{
    const b=document.createElement("button");
    b.className="tab"+(i===active?" on":"");
    b.innerHTML=`<span>${setName(s.set)}</span><span class="p">P=${s.n_features??"?"}</span>`;
    b.onclick=()=>{active=i;sel=new Set();hover=null;render();};
    t.appendChild(b);
  });
}

function models(){ // present models, in ORDER
  const m = DATA.sets[active].models;
  return ORDER.filter(k=>m[k]);
}
// selection is a multi-select FILTER: empty selection -> show every model.
function visible(){ return sel.size ? models().filter(m=>sel.has(m)) : models(); }

function render(){
  buildTabs();
  const s = DATA.sets[active];
  document.getElementById("meta").innerHTML =
    `样本外 ${s.test_start} → ${s.test_end}<br>${models().length} 个模型 · 60 品种 · 日频`;
  document.getElementById("chartnote").textContent = `测试期 ${s.test_start} → ${s.test_end}`;
  drawChart(); drawLegend(); drawTable();
}

function drawChart(){
  const s = DATA.sets[active], W=1120, H=440, PL=52, PR=64, PT=16, PB=30;
  const ms = visible();
  // domain over the visible (selected, or all) series
  let lo=Infinity, hi=-Infinity;
  ms.forEach(m=>{ s.models[m].nav.forEach(p=>{lo=Math.min(lo,p.v);hi=Math.max(hi,p.v);}); });
  if(!isFinite(lo)){lo=0.8;hi=1.2;}
  const pad=(hi-lo)*0.06||0.05; lo-=pad; hi+=pad;
  const N = s.models[models()[0]].nav.length;
  const x = i => PL + (W-PL-PR)*(i/(N-1));
  const y = v => PT + (H-PT-PB)*(1-(v-lo)/(hi-lo));

  let g="";
  const ticks=5;
  for(let k=0;k<=ticks;k++){ const v=lo+(hi-lo)*k/ticks, yy=y(v);
    g+=`<line class="gridline" x1="${PL}" x2="${W-PR}" y1="${yy.toFixed(1)}" y2="${yy.toFixed(1)}"/>`;
    g+=`<text class="axis-lbl" x="${PL-8}" y="${(yy+3).toFixed(1)}" text-anchor="end">${v.toFixed(2)}</text>`; }
  if(1>lo&&1<hi){ g+=`<line class="zeroline" x1="${PL}" x2="${W-PR}" y1="${y(1).toFixed(1)}" y2="${y(1).toFixed(1)}"/>`; }
  const navRef = s.models[models()[0]].nav;
  [0,Math.floor(N/2),N-1].forEach(i=>{ const d=navRef[i]?.d||"";
    g+=`<text class="axis-lbl" x="${x(i).toFixed(1)}" y="${H-10}" text-anchor="${i===0?'start':i===N-1?'end':'middle'}">${d}</text>`;});

  // emphasized drawn last; hovering a legend/table item highlights that line
  const draw = ms.slice().sort((a,b)=> (EMPH.has(a)?1:0)-(EMPH.has(b)?1:0));
  draw.forEach(m=>{
    const nav=s.models[m].nav, pts=nav.map((p,i)=>`${x(i).toFixed(1)},${y(p.v).toFixed(1)}`).join(" ");
    const hot = hover===m, dim = hover&&hover!==m;
    const w = EMPH.has(m)?2.1:1.4;
    g+=`<path class="series${hot?' hot':''}${dim?' dim':''}" d="M${pts}" stroke="${col(m)}" style="stroke-width:${hot?2.8:w}"/>`;
  });
  // endpoint dot only for the hovered line (no on-curve strategy labels — too busy)
  if(hover && ms.includes(hover)){
    const v=s.models[hover].nav.at(-1).v;
    g+=`<circle cx="${x(N-1).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3" fill="${col(hover)}"/>`;
  }

  document.getElementById("chartwrap").innerHTML =
    `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
       <line id="xh" class="crosshair" x1="0" x2="0" y1="${PT}" y2="${H-PB}" style="opacity:0"/>${g}</svg>
     <div class="tip" id="tip"></div>`;
  wireHover(s,W,PL,PR,N,x);
}

function wireHover(s,W,PL,PR,N,x){
  const svg=document.querySelector("svg.chart"), tip=document.getElementById("tip"),
        xh=document.getElementById("xh");
  const ms=visible();
  svg.onmousemove=e=>{
    const r=svg.getBoundingClientRect(), sx=(e.clientX-r.left)/r.width*W;
    let i=Math.round((sx-PL)/((W-PL-PR)/(N-1))); i=Math.max(0,Math.min(N-1,i));
    xh.setAttribute("x1",x(i));xh.setAttribute("x2",x(i));xh.style.opacity=1;
    const rows=ms.map(m=>({m,v:s.models[m].nav[i]?.v})).filter(o=>o.v!=null).sort((a,b)=>b.v-a.v);
    tip.innerHTML=`<div class="td">${s.models[ms[0]].nav[i]?.d||""}</div>`+
      rows.slice(0,8).map(o=>`<div class="row"><span><span class="dot" style="background:${col(o.m)}"></span>${lab(o.m)}</span><span>${o.v.toFixed(3)}</span></div>`).join("");
    const px=x(i)/W*r.width; tip.style.opacity=1;
    tip.style.left=Math.min(r.width-185, Math.max(4,px+12))+"px";
    tip.style.top="18px";
  };
  svg.onmouseleave=()=>{tip.style.opacity=0;xh.style.opacity=0;};
}

function drawLegend(){
  const L=document.getElementById("legend"), s=DATA.sets[active];
  L.innerHTML="";
  // order by final net value, largest first
  const ordered = models().slice().sort((a,b)=> s.models[b].nav.at(-1).v - s.models[a].nav.at(-1).v);
  ordered.forEach(m=>{
    const on = sel.has(m), muted = sel.size && !on;
    const el=document.createElement("div");
    el.className="lg"+(muted?" off":"")+(on?" pin":"");
    el.innerHTML=`<span class="sw" style="background:${col(m)}"></span>${lab(m)}`;
    el.onclick=()=>{ sel.has(m)?sel.delete(m):sel.add(m); render(); };
    el.onmouseenter=()=>{ hover=m; drawChart(); };
    el.onmouseleave=()=>{ hover=null; drawChart(); };
    L.appendChild(el);
  });
  const hint=document.createElement("div"); hint.className="lg"; hint.style.cursor="default";
  hint.style.color="var(--ink-faint)";
  hint.textContent = sel.size ? `已选 ${sel.size} 个(再点取消 · 全不选=看全部)` : "点击图例选择要看的策略 · 可多选 · 默认全部";
  L.appendChild(hint);
}

function drawTable(){
  const s=DATA.sets[active], T=document.getElementById("tbl");
  const cols=[["model","模型"],["sharpe","夏普"],["ann_return","年化收益"],
    ["ann_vol","年化波动"],["max_dd","最大回撤"],["hit","胜率"]];
  const rows=models().map(m=>({m,...s.models[m]}));
  rows.sort((a,b)=> sortKey==="model" ? (a.m<b.m?-1:1)*sortDir : (a[sortKey]-b[sortKey])*sortDir);
  const maxShr=Math.max(...rows.map(r=>Math.abs(r.sharpe)),0.1);
  T.innerHTML=`<thead><tr>${cols.map(([k,l])=>
      `<th data-k="${k}" class="${k===sortKey?'sortby':''}">${l}${k===sortKey?(sortDir<0?' ▾':' ▴'):''}</th>`).join("")}</tr></thead>
    <tbody>${rows.map(r=>{
      const pc=v=>v>=0?"pos":"neg", bw=Math.abs(r.sharpe)/maxShr*100;
      return `<tr data-m="${r.m}" class="${sel.has(r.m)?'hot':''}">
        <td><div class="mname"><span class="sw" style="background:${col(r.m)}"></span>${lab(r.m)}<span class="tag">${TAG[r.m]||""}</span></div></td>
        <td class="num bar ${pc(r.sharpe)}"><span class="fill" style="width:${bw}%;background:${r.sharpe>=0?'var(--pos)':'var(--neg)'}"></span><span>${fmt(r.sharpe)}</span></td>
        <td class="num ${pc(r.ann_return)}">${fmt(r.ann_return*100,1)}%</td>
        <td class="num">${(r.ann_vol*100).toFixed(1)}%</td>
        <td class="num neg">${(r.max_dd*100).toFixed(1)}%</td>
        <td class="num">${(r.hit*100).toFixed(1)}%</td></tr>`;}).join("")}</tbody>`;
  T.querySelectorAll("thead th").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; if(k===sortKey)sortDir*=-1; else{sortKey=k;sortDir=k==="model"?1:-1;} drawTable();});
  T.querySelectorAll("tbody tr").forEach(tr=>{
    tr.onclick=()=>{const m=tr.dataset.m; sel.has(m)?sel.delete(m):sel.add(m); render();};
    tr.onmouseenter=()=>{ hover=tr.dataset.m; drawChart(); };
    tr.onmouseleave=()=>{ hover=null; drawChart(); };
  });
}

render();
</script>

</body>
</html>
